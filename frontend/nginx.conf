server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Explicitly load MIME type mappings.
    # nginx's compiled-in default is text/html — without this, .js files get
    # served as text/html, which browsers reject for <script type="module">.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Vite writes all hashed bundles (JS, CSS, fonts, images) into /assets/.
    # Prefix match is faster and more reliable than a file-extension regex.
    # 1-year cache is safe because every filename contains a content hash —
    # a new deploy always produces new filenames.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback: serve index.html for any path that doesn't match
    # a real file, so React Router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
