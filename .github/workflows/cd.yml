name: CD

on:
  push:
    branches:
      - master
      - release/*
    tags:
      - 'v*.*.*'

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_calorie_checker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: test_calorie_checker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ANTHROPIC_API_KEY: dummy-key-for-ci-testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django tests with pytest
        working-directory: backend
        run: pytest -v --tb=short --no-header


  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA and ref name
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          # On a tag push GITHUB_REF_NAME is the tag (e.g. v1.2.3).
          # On a branch push it is the branch name (e.g. master).
          echo "image_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate backend image tags
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short
            type=ref,event=tag

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate frontend image tags
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short
            type=ref,event=tag

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull backend image from DockerHub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:latest

      - name: Scan backend image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF to GitHub Security Advisory
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-container-scan

      - name: Save SARIF as downloadable artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif
          retention-days: 90


  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Trivy SARIF artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-sarif-report
          path: ./release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## CalorieChecker ${{ github.ref_name }}

            ### Docker Images Published

            **Backend**
            | Tag | Pull command |
            |-----|-------------|
            | `${{ github.ref_name }}` (this release) | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:${{ github.ref_name }}` |
            | `latest` | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:latest` |
            | `${{ needs.build-and-push.outputs.short_sha }}` (commit SHA) | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:${{ needs.build-and-push.outputs.short_sha }}` |

            **Frontend**
            | Tag | Pull command |
            |-----|-------------|
            | `${{ github.ref_name }}` (this release) | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:${{ github.ref_name }}` |
            | `latest` | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:latest` |
            | `${{ needs.build-and-push.outputs.short_sha }}` (commit SHA) | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:${{ needs.build-and-push.outputs.short_sha }}` |

            ### Quick Start
            ```bash
            # Pull this specific release
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:${{ github.ref_name }}

            # Or use docker-compose with the pinned tag
            BACKEND_TAG=${{ github.ref_name }} FRONTEND_TAG=${{ github.ref_name }} docker-compose up -d
            ```

            ### Commit
            `${{ github.sha }}`

            ---
            *The Trivy security scan report (SARIF) is attached below as a release asset.*
          files: ./release-artifacts/trivy-results.sarif
          draft: false
          prerelease: false


  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    # Runs on every push to master/release/* and every version tag.
    # Triggers after Docker images are confirmed pushed to DockerHub.
    #
    # Required GitHub Secrets (Settings → Secrets and variables → Actions):
    #   DIGITALOCEAN_ACCESS_TOKEN — DigitalOcean personal access token
    #                               (Scope: read + write on Kubernetes)
    #   K8S_CLUSTER_NAME          — name of your DigitalOcean K8s cluster
    #                               (visible in the DigitalOcean dashboard)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        # doctl is the DigitalOcean CLI. This action:
        #   1. Installs the latest doctl binary on the runner
        #   2. Runs "doctl auth init --access-token <token>" automatically
        # After this step, all doctl commands are authenticated.

      - name: Save kubeconfig for cluster
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.K8S_CLUSTER_NAME }}
        # Downloads the cluster's kubeconfig and merges it into ~/.kube/config.
        # After this step, kubectl commands automatically target the DigitalOcean
        # Kubernetes cluster. K8S_CLUSTER_NAME is the cluster name in the DO dashboard
        # (e.g. "caloriechecker-cluster").

      - name: Roll out new backend image
        run: kubectl rollout restart deployment/backend -n caloriechecker-prod
        # Triggers a rolling update on the backend Deployment.
        # Kubernetes terminates old pods one at a time and starts new pods that
        # pull the freshly-pushed "latest" image from DockerHub.
        # The Deployment's maxUnavailable: 0 ensures zero downtime during the rollout.

      - name: Roll out new frontend image
        run: kubectl rollout restart deployment/frontend -n caloriechecker-prod
        # Same rolling restart for the frontend Deployment.
        # nginx in new pods serves the Vite-built React app from the updated image.

      - name: Wait for backend rollout to complete
        run: kubectl rollout status deployment/backend -n caloriechecker-prod --timeout=300s
        # Blocks until all backend pods are running the new image and passing their
        # readinessProbe (/api/health/ returns 200). Times out after 5 minutes.
        # If the new pods crash-loop, this step fails → GitHub Actions job goes red
        # → team is notified to investigate before the issue reaches users.

      - name: Wait for frontend rollout to complete
        run: kubectl rollout status deployment/frontend -n caloriechecker-prod --timeout=300s
        # Same wait for frontend. Ensures the job only succeeds once both deployments
        # are fully healthy with the new images.


  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print deployment summary
        shell: bash
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "=========================================="
          echo "  CalorieChecker Deployment Summary"
          echo "=========================================="
          echo ""
          echo "  Git ref:    ${{ github.ref_name }}"
          echo "  Commit SHA: ${{ github.sha }}"
          echo "  Short SHA:  ${SHORT_SHA}"
          echo ""
          echo "  Images pushed to DockerHub:"
          echo "    ${DOCKERHUB_USER}/caloriechecker-backend:latest"
          echo "    ${DOCKERHUB_USER}/caloriechecker-backend:${SHORT_SHA}"
          echo "    ${DOCKERHUB_USER}/caloriechecker-frontend:latest"
          echo "    ${DOCKERHUB_USER}/caloriechecker-frontend:${SHORT_SHA}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "    ${DOCKERHUB_USER}/caloriechecker-backend:${IMAGE_TAG}"
            echo "    ${DOCKERHUB_USER}/caloriechecker-frontend:${IMAGE_TAG}"
          fi
          echo ""
          echo "  --- Commands to run on a production server ---"
          echo ""
          echo "  # Pull the latest images"
          echo "  docker pull ${DOCKERHUB_USER}/caloriechecker-backend:latest"
          echo "  docker pull ${DOCKERHUB_USER}/caloriechecker-frontend:latest"
          echo ""
          echo "  # Rolling update (zero-downtime, restart one service at a time)"
          echo "  docker-compose pull"
          echo "  docker-compose up -d --no-deps backend"
          echo "  docker-compose up -d --no-deps frontend"
          echo ""
          echo "  # Full restart (brief downtime, simpler)"
          echo "  docker-compose down && docker-compose up -d"
          echo "=========================================="

      - name: Create deployment summary artifact
        shell: bash
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
        run: |
          cat > deployment-summary.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_ref": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "short_sha": "${SHORT_SHA}",
            "images_pushed": {
              "backend_latest": "${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:latest",
              "backend_sha": "${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-backend:${SHORT_SHA}",
              "frontend_latest": "${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:latest",
              "frontend_sha": "${{ secrets.DOCKERHUB_USERNAME }}/caloriechecker-frontend:${SHORT_SHA}"
            },
            "workflow_run": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload deployment summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.json
          retention-days: 90
