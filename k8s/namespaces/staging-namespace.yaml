# ============================================================
# Staging Namespace — caloriechecker-staging
# ============================================================
# The staging environment mirrors production in structure but
# runs at half the resource budget.
#
# Purpose of staging:
#   • Test new features in a production-like environment before
#     promoting to caloriechecker-prod
#   • Run the QA team's manual test cases
#   • Validate database migrations (run migrate against a real DB)
#   • Practice rollback procedures safely
#   • Load-test at small scale
#   • Let new developers experiment without risking real data
#
# Key differences from prod:
#   • environment=staging label
#   • ResourceQuota is exactly HALF of production's values
#   • No real user traffic is ever routed here
#   • May use a different (smaller) database or a database snapshot
#
# Note on LimitRange:
#   The per-container LimitRange settings are IDENTICAL to prod.
#   This is intentional: if a container behaves differently in staging
#   vs prod due to different resource limits, you'd have a false sense
#   of security. The total capacity differs (ResourceQuota), but the
#   per-container behaviour should match.
# ============================================================

apiVersion: v1
kind: Namespace

metadata:
  name: caloriechecker-staging   # Separate namespace from prod — total isolation

  labels:
    environment: staging         # Different from production; key for selectors
    project: caloriechecker
    managed-by: kubectl

  annotations:
    description: "Staging namespace for CalorieChecker — pre-production testing only. No real user data."
    owner: "viktor@caloriechecker.com"
    created-by: "kubectl apply"

---
# ============================================================
# ResourceQuota — staging-quota
# ============================================================
# Staging gets exactly HALF the resource budget of production.
#
# Rationale for 50%:
#   • Staging must run the full application stack (backend,
#     frontend, postgres) — so it can't be too small.
#   • Staging traffic is minimal (QA team only), so 50% is
#     far more than enough.
#   • Prevents staging from accidentally competing with prod
#     for cluster resources during peak load.
#
# This 2-node DigitalOcean cluster has limited resources.
# prod + staging together use 6 CPU / 6Gi at request level,
# leaving headroom for the monitoring namespace.
# ============================================================

apiVersion: v1
kind: ResourceQuota

metadata:
  name: staging-quota
  namespace: caloriechecker-staging

spec:
  hard:
    # Half of prod values — enough to run the full stack at low traffic
    requests.cpu: "2"          # Half of prod's 4 cores
    limits.cpu: "4"            # Half of prod's 8 cores
    requests.memory: "2Gi"    # Half of prod's 4Gi
    limits.memory: "4Gi"      # Half of prod's 8Gi
    pods: "10"                 # Half of prod's 20 pods
    persistentvolumeclaims: "3" # Postgres data + spare (less than prod)
    services: "5"              # Fewer services needed in staging
    secrets: "10"              # Half of prod's 20 secrets
    configmaps: "5"            # Half of prod's 10 configmaps

---
# ============================================================
# LimitRange — staging-limitrange
# ============================================================
# Per-container limits are IDENTICAL to production.
# See prod-namespace.yaml for detailed explanations of each field.
#
# Keeping them the same ensures that a container that works
# within its limits in staging will work in production too.
# The only difference is the total capacity (ResourceQuota above).
# ============================================================

apiVersion: v1
kind: LimitRange

metadata:
  name: staging-limitrange
  namespace: caloriechecker-staging

spec:
  limits:
    - type: Container

      # These values are the same as prod — staging containers must
      # behave within the same per-container boundaries as production.
      default:
        cpu: "500m"
        memory: "512Mi"

      defaultRequest:
        cpu: "100m"
        memory: "128Mi"

      max:
        cpu: "2"
        memory: "2Gi"

      min:
        cpu: "50m"
        memory: "64Mi"
