apiVersion: v1
kind: Namespace

metadata:
  name: caloriechecker-prod

  labels:
    environment: production
    project: caloriechecker
    managed-by: kubectl

  annotations:
    description: "Production namespace for CalorieChecker (Django + React + PostgreSQL)"
    owner: "viktor@caloriechecker.com"
    created-by: "kubectl apply"
    kubernetes.io/change-cause: "Initial namespace creation"

---

apiVersion: v1
kind: ResourceQuota

metadata:
  name: prod-quota
  namespace: caloriechecker-prod

spec:
  hard:
    requests.cpu: "4"
    limits.cpu: "8"
    requests.memory: "4Gi"
    limits.memory: "8Gi"
    pods: "20"
    persistentvolumeclaims: "5"
    services: "10"
    secrets: "20"
    configmaps: "10"

---

apiVersion: v1
kind: LimitRange

metadata:
  name: prod-limitrange
  namespace: caloriechecker-prod

spec:
  limits:
    - type: Container

      default:
        cpu: "500m"
        memory: "512Mi"

      defaultRequest:
        cpu: "100m"
        memory: "128Mi"

      max:
        cpu: "2"
        memory: "2Gi"

      min:
        cpu: "50m"
        memory: "64Mi"