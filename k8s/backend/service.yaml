apiVersion: v1
kind: Service

metadata:
  name: backend
  namespace: caloriechecker-prod

  labels:
    app: backend
    tier: backend

  annotations:
    description: "Internal ClusterIP service for Django backend — not exposed externally. Access via Ingress at /api/ and /admin/ paths only."

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - name: http

      protocol: TCP

      port: 8000

      targetPort: 8000

    - name: static
      protocol: TCP
      port: 8080

      targetPort: 8080