apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: caloriechecker-prod

  labels:
    app: backend
    tier: backend
    environment: production

  annotations:
    description: "Django REST API backend for CalorieChecker application"
    version: "1.0.0"

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: backend
        tier: backend
        environment: production

    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready before starting Django..."
              until nc -z postgres 5432; do
                echo "PostgreSQL not ready. Retrying in 5 seconds..."
                sleep 5
              done
              echo "PostgreSQL is up! Django backend will now start."
          securityContext:
            runAsNonRoot: false

        - name: collect-static
          image: vnikiforovski0604/caloriechecker-backend:latest
          imagePullPolicy: Always
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          envFrom:
            - secretRef:
                name: caloriechecker-secrets
            - configMapRef:
                name: caloriechecker-config
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000

      containers:
        - name: backend
          image: vnikiforovski0604/caloriechecker-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000

          envFrom:
            - secretRef:
                name: caloriechecker-secrets

            - configMapRef:
                name: caloriechecker-config

          resources:
            requests:
              cpu: 250m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3

        - name: nginx-static
          image: nginx:alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: static
              containerPort: 8080

          volumeMounts:
            - name: nginx-static-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true

            - name: static-files
              mountPath: /usr/share/nginx/html/static
              readOnly: true

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /static/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000

      volumes:
        - name: static-files
          emptyDir: {}

        - name: nginx-static-config
          configMap:
            name: nginx-static-config