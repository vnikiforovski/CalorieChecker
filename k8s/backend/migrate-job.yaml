apiVersion: batch/v1
kind: Job

metadata:
  name: django-migrate
  namespace: caloriechecker-prod

  labels:
    app: django-migrate
    tier: backend

  annotations:
    description: "This job runs database migrations before deployment"

spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: django-migrate
        tier: backend

    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35

          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              # This is a shell script that loops until PostgreSQL is reachable.
              # The | means "block scalar" in YAML — everything indented below
              # is treated as a single multi-line string.

              echo "Waiting for PostgreSQL to be ready..."
              # Print a message so we can see progress in pod logs

              until nc -z postgres 5432; do
              # "until" loops UNTIL the condition is TRUE (opposite of "while")
              # nc = netcat, a tool for checking TCP connections
              # -z = "zero-I/O mode" — just check if the port is open, don't send data
              # postgres = the hostname of the PostgreSQL service (defined in postgres/service.yaml)
              # 5432 = PostgreSQL's default port
              # This tries to open a TCP connection to postgres:5432
              # If it succeeds (postgres is ready), nc exits 0 → loop ends
              # If it fails (postgres isn't ready yet), nc exits non-zero → loop continues

                echo "PostgreSQL is not ready yet. Waiting 5 seconds..."
                sleep 5
                # Wait 5 seconds before trying again.
                # Too short = hammers the network; too long = slow startup.
                # 5 seconds is a good balance.
              done

              echo "PostgreSQL is ready! Starting migrations..."
              # This prints only when the loop exits (postgres accepted our connection)

      containers:
        - name: django-migrate

          image: vnikiforovski0604/caloriechecker-backend:latest

          imagePullPolicy: Always

          command:
            - python
            - manage.py
            - migrate
            - --noinput

          envFrom:
            - secretRef:
                name: caloriechecker-secrets

            - configMapRef:
                name: caloriechecker-config