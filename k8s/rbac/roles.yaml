# ============================================================
# RBAC Roles and ClusterRoles
# ============================================================
# RBAC (Role-Based Access Control) controls WHO can do WHAT
# to WHICH Kubernetes resources. It is the primary security
# boundary for API server access.
#
# The four RBAC object types:
# ┌──────────────────────┬────────────────────────────────────┐
# │ Resource             │ Scope                              │
# ├──────────────────────┼────────────────────────────────────┤
# │ Role                 │ Permissions scoped to ONE namespace│
# │ ClusterRole          │ Permissions across ALL namespaces  │
# │ RoleBinding          │ Grants a Role to a subject         │
# │ ClusterRoleBinding   │ Grants a ClusterRole cluster-wide  │
# └──────────────────────┴────────────────────────────────────┘
#
# A "rule" in RBAC has three required parts:
#
#   apiGroups — which API group owns the resource?
#     ""                          core API (pods, services, secrets, pvc, etc.)
#     "apps"                      apps/v1 (Deployments, StatefulSets, DaemonSets)
#     "batch"                     batch/v1 (Jobs, CronJobs)
#     "networking.k8s.io"         networking (Ingresses, NetworkPolicies)
#     "rbac.authorization.k8s.io" RBAC resources themselves
#     "metrics.k8s.io"            metrics-server API
#
#   resources — which resource type?
#     pods, services, configmaps, secrets, persistentvolumeclaims,
#     deployments, statefulsets, daemonsets, jobs, cronjobs, etc.
#     Use "*" to mean "all resources in this apiGroup"
#
#   verbs — which operation?
#     get    — read ONE named resource (GET /api/v1/namespaces/X/pods/Y)
#     list   — read ALL resources of a type (GET /api/v1/namespaces/X/pods)
#     watch  — stream updates via WebSocket (used by controllers & monitoring)
#     create — create a new resource (POST)
#     update — replace an entire resource (PUT)
#     patch  — partially modify a resource (PATCH)
#     delete — delete one resource (DELETE)
#     deletecollection — delete all matching resources
#     Use "*" to mean "all verbs"
#
# Principle of Least Privilege:
#   Always grant the MINIMUM permissions necessary.
#   A read-only dashboard should never have delete permissions.
#   A CI/CD pipeline should never have admin access.
# ============================================================

# ── Role: caloriechecker-reader ──────────────────────────────
# Read-only access to common resources in caloriechecker-prod.
#
# Suitable for:
#   • Monitoring agents that scrape application metrics
#   • Log shipping sidecars that read pod metadata
#   • Read-only dashboards that query the K8s API directly
#   • Developers who need to inspect the state but not modify it
#   • Audit tools
apiVersion: rbac.authorization.k8s.io/v1   # RBAC is in its own API group (not core v1)
kind: Role                                   # Role = namespace-scoped permissions

metadata:
  name: caloriechecker-reader
  namespace: caloriechecker-prod   # This Role ONLY grants permissions within this namespace.
                                    # It cannot see or affect resources in other namespaces.
  labels:
    project: caloriechecker
    environment: production
    rbac-tier: reader               # Custom label for RBAC tier — useful for auditing

rules:
  # Rule 1: Read-only access to core (v1) resources
  # "" (empty string) identifies the "core" API group.
  # These are the foundational Kubernetes resources from v1.
  - apiGroups: [""]
    resources:
      - pods            # The actual running containers
      - services        # Network endpoints pointing to pods
      - configmaps      # Non-sensitive application configuration
      - endpoints       # The list of pod IPs behind a Service
      - events          # Kubernetes event stream (great for debugging)
    verbs: [get, list, watch]
    # get   = kubectl get pod my-pod
    # list  = kubectl get pods
    # watch = kubectl get pods --watch (streaming updates)

  # Rule 2: Read-only access to apps (apps/v1) resources
  # Deployments, StatefulSets, and ReplicaSets are in the "apps" group.
  - apiGroups: ["apps"]
    resources:
      - deployments     # Manages rolling updates of stateless pods
      - statefulsets    # Manages stateful pods (like postgres)
      - replicasets     # Managed by Deployments (rarely touched directly)
      - daemonsets      # One pod per node (e.g., log collectors)
    verbs: [get, list, watch]

---
# ── Role: caloriechecker-developer ───────────────────────────
# Read and write access for day-to-day development tasks.
#
# Suitable for:
#   • CI/CD pipelines (GitHub Actions deploying new images)
#   • Developer workstations running kubectl for deployments
#   • Automated deployment scripts
#
# IMPORTANT: This role includes Secret access. Only grant this
# role to trusted identities (not temporary demo accounts).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: caloriechecker-developer
  namespace: caloriechecker-prod
  labels:
    project: caloriechecker
    environment: production
    rbac-tier: developer

rules:
  # Rule 1: Full CRUD on core compute resources
  # CRUD = Create, Read, Update, Delete
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - endpoints
      - persistentvolumeclaims   # Storage volume requests
    verbs: [get, list, watch, create, update, patch, delete]

  # Rule 2: Read+write Secrets (for deployments referencing them)
  # Note: "delete" is intentionally OMITTED from secrets.
  # Accidental secret deletion would break the running application
  # and could cause an outage. Admins should handle secret deletion.
  - apiGroups: [""]
    resources:
      - secrets
    verbs: [get, list, watch, create, update, patch]
    # No 'delete' — prevents accidental deletion of production secrets.

  # Rule 3: Manage Deployments and StatefulSets
  # CI/CD pipelines need to trigger rolling updates (set new image tags).
  # `patch` is the most common verb here — it updates only the image field.
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: [get, list, watch, create, update, patch, delete]

  # Rule 4: Read pod logs (critical for debugging failed deployments)
  # pods/log is a "subresource" — a child endpoint under /pods/<name>/log
  # kubectl logs my-pod   → uses this rule
  - apiGroups: [""]
    resources:
      - pods/log        # Stream stdout/stderr logs from a container
      - pods/status     # Read pod status (phase, conditions, container states)
    verbs: [get, list]

  # Rule 5: Execute commands in pods (for debugging)
  # pods/exec is the subresource used by: kubectl exec -it my-pod -- bash
  # Consider removing this in very strict production environments.
  - apiGroups: [""]
    resources:
      - pods/exec       # Run commands inside a container
    verbs: [create]     # 'create' is the verb for exec (it creates a new exec session)

---
# ── Role: caloriechecker-admin ───────────────────────────────
# Full administrative access to the caloriechecker-prod namespace.
#
# Suitable for:
#   • The namespace owner (you, the developer)
#   • Senior ops engineers
#   • Break-glass emergency procedures
#
# This role uses wildcards ("*") for convenience, but it is
# still scoped to ONE namespace. The cluster-level resources
# (nodes, PersistentVolumes, CRDs) are NOT accessible via this Role.
# Only a ClusterRole can grant access to cluster-scoped resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: caloriechecker-admin
  namespace: caloriechecker-prod
  labels:
    project: caloriechecker
    environment: production
    rbac-tier: admin

rules:
  # Rule 1: Full access to all core (v1) resources
  # resources: ["*"] = ALL resources: pods, services, secrets, configmaps,
  # persistentvolumeclaims, serviceaccounts, resourcequotas, etc.
  # verbs: ["*"]     = ALL verbs: get, list, watch, create, update, patch, delete, ...
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]

  # Rule 2: Full access to apps resources (Deployments, StatefulSets, etc.)
  - apiGroups: ["apps"]
    resources: ["*"]   # deployments, statefulsets, daemonsets, replicasets
    verbs: ["*"]

  # Rule 3: Full access to batch resources (Jobs, CronJobs)
  # Useful for database backup CronJobs, one-off migration Jobs, etc.
  - apiGroups: ["batch"]
    resources: ["*"]   # jobs, cronjobs
    verbs: ["*"]

  # Rule 4: Full access to networking resources (Ingress, NetworkPolicy)
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]   # ingresses, networkpolicies, ingressclasses
    verbs: ["*"]

  # Rule 5: Full access to autoscaling (HorizontalPodAutoscaler)
  # HPAs automatically scale deployments based on CPU/memory metrics.
  - apiGroups: ["autoscaling"]
    resources: ["*"]   # horizontalpodautoscalers
    verbs: ["*"]

  # Rule 6: Full access to policy resources (PodDisruptionBudget)
  # PDBs limit how many pods can be unavailable during voluntary disruptions
  # (e.g., node maintenance, rolling updates).
  - apiGroups: ["policy"]
    resources: ["*"]   # poddisruptionbudgets
    verbs: ["*"]

---
# ── ClusterRole: caloriechecker-monitoring-reader ─────────────
# A ClusterRole grants permissions that work ACROSS all namespaces
# (unlike Role which is scoped to one namespace).
#
# Why a ClusterRole for monitoring?
#   Prometheus needs to discover and scrape metrics from pods in
#   ALL namespaces: caloriechecker-prod, caloriechecker-staging,
#   kube-system, etc. A regular Role in one namespace wouldn't
#   let Prometheus see pods in other namespaces.
#
# Note: A ClusterRole by itself doesn't grant anything.
# It must be bound via a RoleBinding (grants it in ONE namespace)
# or ClusterRoleBinding (grants it cluster-wide).
# We use ClusterRoleBinding for monitoring (see rolebindings.yaml).
#
# Suitable for:
#   • Prometheus (metric collection)
#   • Grafana with Kubernetes datasource plugin
#   • kube-state-metrics (cluster-level metrics exporter)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole   # Note: ClusterRole, NOT Role. No namespace field.

metadata:
  name: caloriechecker-monitoring-reader
  # ClusterRoles have NO namespace field — they are cluster-scoped objects.
  labels:
    project: caloriechecker
    rbac-tier: monitoring

rules:
  # Rule 1: Read core resources across all namespaces
  # Prometheus scrapes metrics from pods cluster-wide.
  # It also needs node metrics for infrastructure dashboards.
  - apiGroups: [""]
    resources:
      - pods            # Discover all running pods for metric scraping
      - nodes           # Node-level metrics (CPU, memory, disk per machine)
      - services        # Service discovery for Prometheus scrape targets
      - endpoints       # Resolve pod IPs behind each Service
      - namespaces      # Prometheus labels metrics with their namespace
      - events          # Event metrics (error rates, warning counts)
      - resourcequotas  # Track quota usage as metrics
      - persistentvolumeclaims   # PVC capacity and usage metrics
    verbs: [get, list, watch]

  # Rule 2: Read apps resources across all namespaces
  # kube-state-metrics exports metrics like:
  #   kube_deployment_status_replicas_available
  #   kube_statefulset_status_replicas
  # These require reading Deployment/StatefulSet objects.
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: [get, list, watch]

  # Rule 3: Read metrics from the metrics-server API
  # The metrics-server aggregates CPU/memory usage from kubelets.
  # Prometheus can federate these, and Grafana's Kubernetes plugin uses them.
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods    # Per-pod CPU/memory usage from metrics-server
      - nodes   # Per-node CPU/memory usage from metrics-server
    verbs: [get, list]
