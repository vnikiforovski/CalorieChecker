apiVersion: v1
kind: Service

metadata:
  name: postgres
  namespace: caloriechecker-prod

  labels:
    app: postgres
    tier: database
    environment: production

  annotations:
    description: "ClusterIP Service for PostgreSQL 15. Internal cluster access only — not reachable from outside. Django connects via POSTGRES_HOST=postgres."

spec:
  type: ClusterIP

  selector:
    app: postgres

  ports:
    - name: postgres
      protocol: TCP
      port: 5432

      targetPort: 5432   