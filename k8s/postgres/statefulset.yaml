apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: caloriechecker-prod

  labels:
    app: postgres
    tier: database
    environment: production

  annotations:
    description: "PostgreSQL 15 primary database — single replica, DigitalOcean block storage"
    managed-by: kubectl

spec:
  serviceName: postgres
  replicas: 1

  updateStrategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres
        tier: database
        environment: production

      annotations:
        description: "PostgreSQL 15 pod — reads credentials from Secret, config from ConfigMap"

    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: postgres
                topologyKey: kubernetes.io/hostname

      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: caloriechecker-secrets   # Secret object name
                  key: POSTGRES_USER             # Key within the Secret's data
                  optional: false                # Pod fails to start if this Secret/key is missing

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: caloriechecker-secrets
                  key: POSTGRES_PASSWORD
                  optional: false

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: caloriechecker-config   # ConfigMap object name
                  key: POSTGRES_DB             # Key within the ConfigMap's data
                  optional: false

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                # pg_isready connects to the local PostgreSQL server and exits 0
                # if the server is accepting connections, non-zero otherwise.
                # -U reads from the environment variable POSTGRES_USER.
                # -d specifies the database to connect to.
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: postgres-data

        labels:
          app: postgres
          environment: production

        annotations:
          description: "DigitalOcean SSD block storage for PostgreSQL data files"

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: do-block-storage

        resources:
          requests:
            storage: 5Gi