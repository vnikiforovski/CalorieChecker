# ============================================================
# PersistentVolumeClaim — postgres-data
# ============================================================
# A PersistentVolumeClaim (PVC) is a request for storage.
# It is how an application says to Kubernetes:
#   "I need X amount of storage with Y access characteristics.
#    Please provision it using Z StorageClass."
#
# ── The Storage Abstraction Layers ────────────────────────────
#
#   StorageClass       "HOW should storage be provisioned?"
#        │              (SSDs? NFS? Replicated? Encrypted?)
#        │              do-block-storage → DigitalOcean SSD
#        ▼
#   PersistentVolume   "WHAT actual storage exists?"
#   (PV)               (Usually auto-created by the StorageClass driver)
#        │              The real disk/volume in DigitalOcean's cloud
#        │
#        ▼  (binding)
#   PersistentVolumeClaim  "Who is USING the storage?"
#   (PVC)                  (This file — the application's request)
#        │
#        ▼  (mount)
#   Pod / Container    "Where does the application ACCESS the storage?"
#                      /var/lib/postgresql/data (PostgreSQL data dir)
#
# ── Why PVC instead of container storage? ─────────────────────
# Container (ephemeral) storage:
#   ✗ Wiped when the container restarts, crashes, or is rescheduled
#   ✗ Lost if the pod is deleted (e.g., during a rolling update)
#   ✗ Not accessible from another pod (no sharing)
#   ✓ Fast (RAM-backed or local node disk)
#
# PersistentVolumeClaim storage:
#   ✓ Survives pod restarts, crashes, and rescheduling
#   ✓ Survives node failures (data is in cloud storage, not local disk)
#   ✓ Can be detached and reattached to a different node
#   ✓ Can be backed up independently of the pod
#   ✗ Slightly slower than local disk (network-attached storage)
#
# PostgreSQL MUST use a PVC. If you used container storage, your
# entire database would be deleted every time the postgres pod
# restarts (deployments, crashes, node maintenance, etc.).
#
# ── Note on StatefulSet volumeClaimTemplates ─────────────────
# This standalone PVC is provided for educational reference.
# In practice, the StatefulSet (statefulset.yaml) uses
# `volumeClaimTemplates` which creates PVCs automatically —
# one per replica with the name: postgres-data-postgres-0
#
# You do NOT need to apply this file if you apply statefulset.yaml,
# because the StatefulSet creates its own PVC automatically.
# This file shows the equivalent standalone PVC for learning.
# ============================================================

apiVersion: v1
kind: PersistentVolumeClaim   # PVCs are in the core (v1) API group

metadata:
  name: postgres-data           # The name that pods reference in their volume config
  namespace: caloriechecker-prod

  labels:
    project: caloriechecker
    environment: production
    app: postgres               # Links this storage to the postgres workload
    tier: database

  annotations:
    description: "5Gi DigitalOcean SSD block storage for PostgreSQL 15 data files (/var/lib/postgresql/data)"
    # DANGER: Deleting this PVC permanently destroys ALL PostgreSQL data.
    # Always run pg_dump before deleting or resizing:
    #   kubectl exec postgres-0 -n caloriechecker-prod -- \
    #     pg_dump -U postgres caloriechecker > backup.sql
    warning: "DANGER: Deleting this PVC destroys all database data. Take a pg_dump backup first."

spec:
  # ── Access Mode ───────────────────────────────────────────────
  # accessModes defines how many nodes can mount the volume simultaneously.
  #
  # ReadWriteOnce (RWO):
  #   The volume can be mounted read-write by ONE NODE at a time.
  #   Other pods on the SAME NODE can also mount it read-write.
  #   This is what block storage (SSDs) supports.
  #   Correct for PostgreSQL: only one primary writes to the data dir.
  #
  # ReadWriteMany (RWX):
  #   Multiple nodes can mount it read-write simultaneously.
  #   Requires a distributed filesystem like NFS or AWS EFS.
  #   DigitalOcean Block Storage does NOT support this.
  #   Useful for shared assets (images, uploads) — NOT for databases.
  #
  # ReadOnlyMany (ROX):
  #   Multiple nodes can mount it read-only simultaneously.
  #   Useful for sharing static content like ML model weights.
  accessModes:
    - ReadWriteOnce   # Only one node at a time — correct for PostgreSQL

  # ── StorageClass ──────────────────────────────────────────────
  # The StorageClass tells Kubernetes HOW to provision the storage.
  # "do-block-storage" is DigitalOcean's built-in StorageClass.
  #
  # What happens when you apply this PVC:
  #   1. Kubernetes sees the PVC is unbound (no matching PV exists)
  #   2. It calls the do-block-storage CSI (Container Storage Interface) driver
  #   3. The driver calls DigitalOcean's API to provision a new Block Storage volume
  #   4. DigitalOcean creates a 5 GiB SSD volume in the same region as your cluster
  #   5. The CSI driver formats it (ext4) and creates a PersistentVolume object
  #   6. Kubernetes binds the PV to this PVC
  #   7. The postgres pod can now mount it at /var/lib/postgresql/data
  #
  # DigitalOcean Block Storage characteristics:
  #   • SSD-backed (fast random I/O — good for OLTP databases)
  #   • Minimum: 1 GiB, Maximum: 16 TiB
  #   • Only attachable to ONE Droplet at a time (enforces ReadWriteOnce)
  #   • 3× replicated within the datacenter (durability, not HA)
  #   • Survives pod restarts, node reboots, even node deletion
  #   • Cost: ~$0.10/GiB/month (5 GiB ≈ $0.50/month)
  storageClassName: do-block-storage

  # ── Resource Request ──────────────────────────────────────────
  # How much storage to claim. 5 GiB should be enough for this project.
  #
  # Rough sizing calculation:
  #   • Each meal row: ~1 KB (meal + 5 food items + daily log update)
  #   • 100 users × 3 meals/day × 365 days/year = 109,500 meals
  #   • 109,500 meals × 1 KB ≈ 110 MB of row data
  #   • PostgreSQL overhead (indexes, MVCC, WAL): 3-5× raw data ≈ 550 MB
  #   • Total for 1 year of 100 active users: ~700 MB
  #   • 5 GiB provides ~7 years of headroom at this scale
  #
  # IMPORTANT: PVC size can be INCREASED but NEVER decreased.
  # To increase: kubectl edit pvc postgres-data -n caloriechecker-prod
  #   (DigitalOcean CSI supports online resize — no downtime needed)
  # To decrease: you must backup, delete, and recreate with new size.
  resources:
    requests:
      storage: 5Gi   # 5 gibibytes = 5,368,709,120 bytes ≈ 5.37 GB
