apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: caloriechecker-ingress
  namespace: caloriechecker-prod

  labels:
    app: caloriechecker
    environment: production

  annotations:

    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"

    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

spec:
  ingressClassName: nginx
  rules:
    -
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          - path: /admin/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          - path: /static/
            pathType: Prefix

            backend:
              service:
                name: backend
                port:
                  number: 8080

          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend
                port:
                  number: 80