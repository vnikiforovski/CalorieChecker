services:
  backend:
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: gunicorn calorie_checker.wsgi:application --bind 0.0.0.0:8000 --reload

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
